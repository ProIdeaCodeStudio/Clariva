<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Clariva — Free educational resources, CBT practice and AI assistance for Nigerian undergraduate students.">
    <meta name="keywords"
        content="Clariva, free educational materials, undergraduate, FUTA, CBT, past questions, Nigeria students, reset password, password, reset, reset-password">
    <meta name="author" content="Pro Idea">
    <title>Reset Password</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link rel="stylesheet" href="Stylesheet.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <header id="header">
        <div class="container">
            <div class="header-inner">
                <div>
                    <div class="edu-wordmark">Clariva</div>
                    <div class="header-tagline">
                        "From Confusion to Confidence."
                    </div>
                </div>

                <a href="index.html" class="header-btn">
                    Back
                </a>
            </div>
        </div>
    </header>

    <section class="container resources-section">

        <div class="gate-form" style="max-width:500px;margin:80px auto;">

            <div class="gate-title">
                Reset Your Password
            </div>

            <div class="gate-subtitle">
                Enter your new password below.
            </div>

            <br>

            <div>

                <label class="gate-field-label">
                    New Password
                </label>

                <input type="password" id="new-password" class="gate-input" placeholder="Enter new password">

            </div>

            <br>

            <div>

                <label class="gate-field-label">
                    Confirm Password
                </label>

                <input type="password" id="confirm-password" class="gate-input" placeholder="Confirm new password">

            </div>

            <p class="gate-error" id="reset-error">
            </p>

            <button class="gate-btn gate-btn-primary" id="reset-password-button">

                Reset Password →

            </button>

        </div>

    </section>
</body>

</html>
